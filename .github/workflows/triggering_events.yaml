name: Triggering Events

on:
    push:
        branches:
            - "master"

    pull_request:
        # The default is to trigger on the following types of events
        types:
            - opened
            - synchronize
            - reopened
        paths:
            # Include .md files in 'my_folder'
            - "my_folder/*.md"
            # Exclude .txt files in 'my_folder'
            - "!my_folder/*.txt"

    schedule:
        - cron: "0 0 * * *" # Midnight UTC

    workflow_dispatch:

jobs:
    echo_event:
        runs-on: ubuntu-24.04
        steps:
            - name: Dump full event JSON
              run: |
               echo "=== $GITHUB_EVENT_NAME payload ==="
               cat "$GITHUB_EVENT_PATH"



        
        
          
                
    

